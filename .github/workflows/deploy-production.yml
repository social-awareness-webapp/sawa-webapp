name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set. Add it under Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@56.2.0

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        run: |
          vercel build --prod --token="$VERCEL_TOKEN"
          test -d .vercel/output || {
            echo "::error::Missing .vercel/output after vercel build"
            exit 1
          }

      - name: Deploy Project Artifacts to Vercel
        # Cap wait time — a healthy prebuilt deploy normally finishes in under a minute.
        # Without this, the CLI can hang forever on "Building…" when a concurrent
        # Git-triggered Vercel build is also running for the same commit.
        run: timeout 5m vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
