name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set. Add it under Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@56.2.0

      # Build on Vercel (not --prebuilt) so Production env vars — including Sensitive —
      # are injected during the Next.js build. `vercel pull` cannot read Sensitive values,
      # so a local prebuilt build would bake in empty NEXT_PUBLIC_SUPABASE_* keys.
      - name: Deploy to Vercel Production
        run: timeout 12m vercel deploy --prod --yes --token="$VERCEL_TOKEN"
